name: Bun Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v4
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Run Bun typecheck build
        run: bun run build
